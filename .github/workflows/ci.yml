name: ci
on:
  push:
    branches: [master, main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # The digest parity gate compares gyzor's digest to REAL pyzor's over the
      # corpus, so install pyzor and regenerate the expected digests first.
      - name: generate pyzor reference digests
        run: |
          pip install --quiet pyzor
          python3 pyzor/testdata/gen_expected.py

      - name: build
        run: go build ./...
      - name: vet
        run: go vet ./...
      - name: test (race)
        run: go test -race ./...
      - name: fuzz (smoke)
        run: go test -run=x -fuzz=FuzzCompute -fuzztime=30s ./pyzor/

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: gofmt
        run: test -z "$(gofmt -l .)" || { gofmt -l .; exit 1; }
      - name: staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          staticcheck ./...
      - name: gosec
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          gosec ./...
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  codeql:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: go
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - run: go build ./...
      - uses: github/codeql-action/analyze@v3
